{% extends 'base.html' %}

{% block content %}
<header class="header">
    <h1>Editar Registro #{{ leitura.id }}</h1>
    <p>Ajuste os valores capturados manualmente caso necessário.</p>
</header>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="section-card">
        <form action="{{ url_for('atualizar', id=leitura.id) }}" method="POST">
            <!-- Simulação de método PUT -->
            <input type="hidden" name="_method" value="PUT">
            
            <div class="form-group">
                <label for="timestamp">Data / Hora Original</label>
                <input type="text" id="timestamp" value="{{ leitura.timestamp }}" disabled style="background: rgba(15,23,42,0.8); color: var(--text-dim);">
            </div>

            <div class="form-group">
                <label for="temperatura">Temperatura (°C)</label>
                <input type="number" step="0.1" name="temperatura" id="temperatura" value="{{ leitura.temperatura }}" required>
            </div>

            <div class="form-group">
                <label for="umidade">Umidade (%)</label>
                <input type="number" step="0.1" name="umidade" id="umidade" value="{{ leitura.umidade }}" required>
            </div>

            <div class="form-group">
                <label for="pressao">Pressão (hPa)</label>
                <input type="number" step="0.1" name="pressao" id="pressao" value="{{ leitura.pressao if leitura.pressao else '' }}">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Salvar Alterações</button>
                <a href="{{ url_for('listar') }}" class="btn" style="background: rgba(255,255,255,0.1); flex: 1; text-align: center;">Cancelar</a>
            </div>
        </form>
        
        <hr style="margin: 2rem 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">
        
        <form action="{{ url_for('deletar', id=leitura.id) }}" method="POST" onsubmit="return confirm('ATENÇÃO: Esta ação é irreversível. Prosseguir?');">
            <button type="submit" class="btn btn-danger" style="width: 100%;">Excluir este Registro</button>
        </form>
    </div>
</div>

<div style="margin-top: 2rem; text-align: center;">
    <a href="{{ url_for('index') }}" style="color: var(--text-dim);">← Voltar ao Dashboard</a>
</div>
{% endblock %}
